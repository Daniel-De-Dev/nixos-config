format = """
$os\
$directory\
$git_branch\
$git_status\
$nix_shell\
$rust\
$fill\
$cmd_duration\
$time\
\n$character"""

[os]
disabled = false
style = "bg:#a0a0a0 fg:#090c0c"
format = "[оӮ¶](fg:#a0a0a0)[$symbol]($style)[оӮҙ ](fg:#a0a0a0)"
[os.symbols]
NixOS = "пҢ“ "

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[оӮ¶](fg:#769ff0)[ $path ]($style)[оӮҙ ](fg:#769ff0)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[git_branch]
symbol = "пҗҳ"
style = "bg:#394260 fg:#769ff0"
format = "[оӮ¶](fg:#394260)[ $symbol $branch ]($style)[оӮҙ ](fg:#394260)"

[git_status]
style = "bg:#394260 fg:#e3e5e5"
format = "[оӮ¶](fg:#394260)[ $all_status$ahead_behind ]($style)[оӮҙ ](fg:#394260)"

[nix_shell]
symbol = "пҢ“"
style = "bg:#212736 fg:#769ff0"
format = "[оӮ¶](fg:#212736)[ $symbol shell ]($style)[оӮҙ ](fg:#212736)"

[rust]
symbol = "оһЁ"
style = "bg:#212736 fg:#769ff0"
format = "[оӮ¶](fg:#212736)[ $symbol ($version) ]($style)[оӮҙ ](fg:#212736)"

[fill]
symbol = " "

[cmd_duration]
style = "bg:#1d2230 fg:#a0a9cb"
format = "[оӮ¶](fg:#1d2230)[ пү’ $duration ]($style)[оӮҙ ](fg:#1d2230)"

[time]
disabled = false
time_format = "%R"
style = "bg:#1d2230 fg:#a0a9cb"
format = "[оӮ¶](fg:#1d2230)[ пҗә $time ]($style)[оӮҙ](fg:#1d2230)"

[character]
success_symbol = "[вқҜ](bold #769ff0)"
error_symbol = "[вқҜ](bold red)"
